# Lightweight APISIX + etcd for local experimentation
# This is a READINESS EXAMPLE — not part of the default stack.
#
# Usage:
#   docker compose -f deploy/apisix/docker-compose.apisix.example.yml up -d
#   docker compose -f deploy/apisix/docker-compose.apisix.example.yml down
#
# APISIX Admin API: http://localhost:9180 (key: edd1c9f034335f136f87ad84b625c8f1)
# APISIX Gateway:   http://localhost:9080

services:
  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      retries: 5

  apisix:
    image: apache/apisix:3.10.0-debian
    ports:
      - "9080:9080"   # Gateway (data plane)
      - "9180:9180"   # Admin API (control plane)
    environment:
      APISIX_STAND_ALONE: "false"
    volumes:
      - ./config.example.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    restart: unless-stopped
