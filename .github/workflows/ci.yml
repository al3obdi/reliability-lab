name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Check syntax (compile all .py files)
        run: python -m compileall api/ worker/ scripts/ tests/

      - name: Verify imports (no missing dependencies)
        run: |
          python -c "import fastapi; print('fastapi OK')"
          python -c "import aio_pika; print('aio_pika OK')"
          python -c "import asyncpg; print('asyncpg OK')"
          python -c "import redis; print('redis OK')"
          python -c "import elasticsearch; print('elasticsearch OK')"
          python -c "import prometheus_client; print('prometheus_client OK')"
          python -c "import httpx; print('httpx OK')"
          python -c "import pydantic; print('pydantic OK')"
          python -c "import pytest; print('pytest OK')"

      - name: Run lightweight tests (no Docker required)
        run: python -m pytest tests/test_portfolio_verify.py -v
