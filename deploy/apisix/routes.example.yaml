# ─────────────────────────────────────────────────────────
# Global rules (applied to all routes)
# ─────────────────────────────────────────────────────────
global_rules:
  - id: "reliability-lab-cors"
    plugins:
      cors:
        allow_origins: "https://reliability-lab.example.com"
        allow_methods: "GET,POST,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        max_age: 3600
