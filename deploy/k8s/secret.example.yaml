apiVersion: v1
kind: Secret
metadata:
  name: reliability-lab-secrets
  labels:
    app: reliability-lab
type: Opaque
stringData:
  # ⚠️  EXAMPLE ONLY — replace with real values from a secret manager
  # In production, use External Secrets Operator, Sealed Secrets,
  # or a cloud secret manager (AWS Secrets Manager, GCP Secret Manager).
  # NEVER commit real secrets to version control.

  # RabbitMQ connection (amqp://user:pass@host:port/vhost)
  RABBITMQ_URL: "amqp://reliability:replace-me@rabbitmq:5672/"

  # PostgreSQL connection (postgresql://user:pass@host:port/db)
  DATABASE_URL: "postgresql://reliability:replace-me@postgres:5432/reliability_lab"

  # Redis connection (redis://host:port/db)
  REDIS_URL: "redis://redis:6379/0"

  # RabbitMQ credentials (used by docker compose; may differ in K8s)
  RABBITMQ_USER: "reliability"
  RABBITMQ_PASS: "replace-me"

  # PostgreSQL credentials
  PG_USER: "reliability"
  PG_PASS: "replace-me"
